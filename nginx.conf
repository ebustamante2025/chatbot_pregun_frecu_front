server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # En Windows/Docker Desktop, host.docker.internal resuelve al host (se lee de /etc/hosts al arrancar).
    # El backend está en el host en el puerto 3001. Así evitamos el DNS 127.0.0.11 que falla si el contenedor no está en la red del compose.
    # Proxy API al backend
    location /api/ {
        proxy_pass http://host.docker.internal:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Socket.IO (p. ej. si el front usa realtime)
    location /socket.io/ {
        proxy_pass http://host.docker.internal:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: todas las rutas a index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache para assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
